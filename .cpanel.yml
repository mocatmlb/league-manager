---
deployment:
  tasks:
    - echo "Starting staging deployment"

    # Create directories
    - mkdir -p /home/moc835/public_html/staging.district8travelleague.com/includes
    - mkdir -p /home/moc835/public_html/staging.district8travelleague.com/logs
    - mkdir -p /home/moc835/public_html/staging.district8travelleague.com/uploads
    - mkdir -p /home/moc835/public_html/staging.district8travelleague.com/backups
    - mkdir -p /home/moc835/public_html/staging.district8travelleague.com/scripts
    - mkdir -p /home/moc835/public_html/staging.district8travelleague.com/vendor
    - mkdir -p /home/moc835/public_html/staging.district8travelleague.com/database/migrations

    # Copy application files
    - cp -R includes/* /home/moc835/public_html/staging.district8travelleague.com/includes/
    - cp -R public/* /home/moc835/public_html/staging.district8travelleague.com/
    - cp -R scripts/* /home/moc835/public_html/staging.district8travelleague.com/scripts/
    - cp -R vendor/* /home/moc835/public_html/staging.district8travelleague.com/vendor/
    - cp -R database/migrations/* /home/moc835/public_html/staging.district8travelleague.com/database/migrations/

    # Use staging config (not prod)
    - cp includes/config.staging.php /home/moc835/public_html/staging.district8travelleague.com/includes/config.php

    # Protect sensitive directories from web access
    - printf "Order deny,allow\nDeny from all" > /home/moc835/public_html/staging.district8travelleague.com/vendor/.htaccess
    - printf "Order deny,allow\nDeny from all" > /home/moc835/public_html/staging.district8travelleague.com/includes/.htaccess

    # Set permissions
    - chmod 755 /home/moc835/public_html/staging.district8travelleague.com/logs
    - chmod 755 /home/moc835/public_html/staging.district8travelleague.com/uploads
    - chmod 755 /home/moc835/public_html/staging.district8travelleague.com/backups
    - chmod 755 /home/moc835/public_html/staging.district8travelleague.com/scripts
    - chmod 644 /home/moc835/public_html/staging.district8travelleague.com/includes/*.php

    # Log the deployment
    - echo "$(date) Staging deployment complete" >> /home/moc835/public_html/staging.district8travelleague.com/logs/deployment.log
    - echo "Done"
