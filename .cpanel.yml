---
deployment:
  tasks:
    # Simple test to verify deployment is running
    - echo "Starting deployment of branch: $CPANEL_DEPLOYMENT_BRANCH"
    - echo "Current directory: $(pwd)"
    - echo "Available files: $(ls -la)"
    
    # Create staging-specific deployment
    - |
      if [ "$CPANEL_DEPLOYMENT_BRANCH" = "staging" ]; then
        echo "Deploying to staging environment"
        TARGETDIR="/home/moc835/public_html/staging.district8travelleague.com"
        
        # Create directories
        mkdir -p $TARGETDIR/includes
        mkdir -p $TARGETDIR/logs  
        mkdir -p $TARGETDIR/uploads
        mkdir -p $TARGETDIR/backups
        mkdir -p $TARGETDIR/templates
        mkdir -p $TARGETDIR/scripts
        
        # Copy files
        cp -R includes/* $TARGETDIR/includes/ || echo "Failed to copy includes"
        cp -R public/* $TARGETDIR/ || echo "Failed to copy public files"
        cp -R templates/* $TARGETDIR/templates/ || echo "Failed to copy templates"
        cp -R scripts/* $TARGETDIR/scripts/ || echo "Failed to copy scripts"
        
        # Copy staging config
        cp includes/config.staging.php $TARGETDIR/includes/config.php || echo "Failed to copy staging config"
        
        # Set permissions
        chmod 755 $TARGETDIR/logs $TARGETDIR/uploads $TARGETDIR/backups $TARGETDIR/scripts
        chmod 644 $TARGETDIR/includes/*.php
        
        # Create log entry
        echo "$(date): Deployed staging branch successfully" >> $TARGETDIR/logs/deployment.log
        echo "Staging deployment completed"
      fi
    
    # Create production-specific deployment  
    - |
      if [ "$CPANEL_DEPLOYMENT_BRANCH" = "main" ]; then
        echo "Deploying to production environment"
        TARGETDIR="/home/moc835/public_html/district8travelleague.com"
        
        # Create directories
        mkdir -p $TARGETDIR/includes
        mkdir -p $TARGETDIR/logs
        mkdir -p $TARGETDIR/uploads
        mkdir -p $TARGETDIR/backups
        mkdir -p $TARGETDIR/templates
        mkdir -p $TARGETDIR/scripts
        
        # Copy files
        cp -R includes/* $TARGETDIR/includes/ || echo "Failed to copy includes"
        cp -R public/* $TARGETDIR/ || echo "Failed to copy public files"
        cp -R templates/* $TARGETDIR/templates/ || echo "Failed to copy templates"
        cp -R scripts/* $TARGETDIR/scripts/ || echo "Failed to copy scripts"
        
        # Copy production config
        cp includes/config.prod.php $TARGETDIR/includes/config.php || echo "Failed to copy production config"
        
        # Set permissions
        chmod 755 $TARGETDIR/logs $TARGETDIR/uploads $TARGETDIR/backups $TARGETDIR/scripts
        chmod 644 $TARGETDIR/includes/*.php
        
        # Create log entry
        echo "$(date): Deployed main branch successfully" >> $TARGETDIR/logs/deployment.log
        echo "Production deployment completed"
      fi
    
    # Fallback for other branches
    - |
      if [ "$CPANEL_DEPLOYMENT_BRANCH" != "staging" ] && [ "$CPANEL_DEPLOYMENT_BRANCH" != "main" ]; then
        echo "Deploying $CPANEL_DEPLOYMENT_BRANCH to test directory"
        TARGETDIR="/home/moc835/public_html/saved-files-do-not-delete/test"
        
        mkdir -p $TARGETDIR
        echo "$(date): Deployed $CPANEL_DEPLOYMENT_BRANCH branch to test directory" >> $TARGETDIR/deployment.log
        echo "Test deployment completed"
      fi
    
    # Final status
    - echo "Deployment process finished for branch: $CPANEL_DEPLOYMENT_BRANCH"